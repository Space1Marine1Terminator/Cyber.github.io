<!DOCTYPE html>
<html>
<head>
  <title>
    Карточки товаров
  </title>
<style type="text/css"> 
html,body
{
  height: 100%;
}

body
{
  margin: 0;
  display: grid;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #f4f7f7;
  background-color: #586875;
  font: 1rem/1 "Cabin", sans-serif;
  overflow-x: hidden;
  background-image: url('6665604289.jpg');
   background-size: cover; 
    background-position: center; 
     background-repeat: no-repeat
      background-attachment: fixed;

}

*, *::before, *::after
{
  box-sizing: border-box;
}

h2
{
  margin: 0
  padding-bottom: 10px;
  border-bottom: 1px dashed #bdd6d2;
  font-size: 1.5rem;
}

.happy-card, .lovers-card
{
 position: relative;
 width: 250px;
 padding: 20px;
 color: #586875;
 background-color: #f4f7f7;
 box-shadow: 0 10px 20px #000600;
 animation-duration: 0.5s;
 animation-timing-function: ease-in-out;
 animation-fill-mode: forwards;
}

@keyframes swing-forwards
{
  0%{
z-index: 1;
transition: scale(0.9);
  }
  50%{
transform: translateX(var(--swing));
  }
  100%{
z-index: 2;
transform: translateX(var(--swing)) scale(1.1);
  }
}

@keyframes swing-backwards
{
  0%{
z-index: 2;
transform: translateX(var(--swing)) scale(1.1);
  }
  50%{
transform: translateX(var(--swing));
  }
  100%{
z-index: 1;
transition: scale(0.9);
  }
}

#happy-radio:checked ~ .selector .happy-card,
#lovers-radio:checked ~ .selector .lovers-card,
{
  animation-name: swing-forwards;
}

#happy-radio:checked ~ .selector .lovers-card,
#lovers-radio:checked ~ .selector .happy-card,
{
  animation-name: swing-forwards;
}

.selector
{
  display: grid;
  grid-template-areas: 
  'happy lovers'
  'pick pick';
}

input
{
  position: absolute;
  width: 1px;
  clip: rect(0 0 0 0);
  overflow: hidden;
  white-space: nowrap;
}

.happy-card
{
  grid-area: happy;
  margin-right: -10px;
  --swing:25px; 
  --overlap:-25px;
}

.lovers-card
{
  grid-area: lovers;
  margin-left: -10px;
  --swing:25px; 
  --overlap:-25px;
}
</style>
</head>
<body>

</body>
</html>

<body>
<div>
  <!-- these radio buttons hold state of which card is in front and which toggle button is visible -->
  <input type="radio" name="sushi-lunch" id="happy-radio">
  <input type="radio" name="sushi-lunch" id="lovers-radio" checked>

  <div class="selector">
    <label for="happy-radio" class="happy-card">
      <h1>Баротравма</h1>
      <ul>
        <li>luaforbarotrauma + csforbarotrauma</li>
        <li>2 солёных микро ползуна</li>
        <li>Косатка и полтора барсука</li>
        <li>Какие-то агрессивные караси</li>
      </ul>
      <p>$15.99</p>
    </label>

    <label for="lovers-radio" class="lovers-card">
      <h2>Гипер шаурма</h2>
      <ul>
        <li>Ядерные топливо</li>
        <li>Дизель</li>
        <li>Кусок плутония с щепоткой урана</li>
        <li>Лаваш</li>
      </ul>
      <p>Сколько она там стоит?</p>
    </label>
    
    <label for="happy-radio" class="happy-pick">Выбор?</label>
    <label for="lovers-radio" class="lovers-pick">Покупай шаурму!</label>
  </div>
</div>
</body>
</html>
