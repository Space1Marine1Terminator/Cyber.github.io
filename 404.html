<!DOCTYPE html>
<html>
<head>
	<title>Error</title>
	<style type="text/css">
		body
		{
			background-color: #111111;
		}
div
{
padding:40px;
font-size: 75px;
font-family: "Monoton",cursive;
text-align: center;
text-transform: uppercase;
text-shadow: 0 0 80px red,0 0 40px FireBrick,0 0 12px Darkred;
}
div p
{
	margin: 0;

}
#error:hover
{
	text-shadow: 0 0 200px #ffffff,0 0 80px #008000,0 0 12px #0000ff;
}
#code:hover
{
	text-shadow: 0 0 80px red,0 0 40px FireBrick,0 0 12px Darkred;
}
#error
{
color:ffffff;
	text-shadow: 0 0 200px #ffffff,0 0 80px #008000,0 0 12px #0000ff;
}
#error span
{
	animation: u 6s linear infinite;
}
@keyframes u 
{
0%,19.999%,22%,62.999%,64%,64.999%,70%,100%
{
opacity: 0.99;
text-shadow: 0 0 80px red,0 0 40px FireBrick,0 0 12px Darkred;
}
20%,21.999%,63%,63.999%,65%,69.999%
{
opacity: 0.4;
}
}
#code span:nth-of-type(2)
{
	animation: l 10s linear infinite;
}
#code span:nth-of-type(1)
{
	text-shadow: none;
	opacity:0.4;
}
@keyframes l
{
0%,12%,18.999%,23%,31.999%,37%,44.999%,46%,49.999%,51%,58.999%,61%,68.999%,71%,85.999%,96%,100%
{
opacity: 0.99;
text-shadow: 0 0 80px red,0 0 40px FireBrick,0 0 12px DarkRed;
}
19%,22.999%,32%,36.999%,45%,45.999%,50%,51.999%,59%,60.999%,69%,70.999%,86%,95.999%
{
opacity: 0.4;
text-shadow: none;
}
}






	</style>
</head>
<body>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet">

<div>
	<p id="error">E<span>R</span>RO<span>R</span></p>
	<p id="code">40<span></span><span>4</span></p>



</div>

</body>
</html>
